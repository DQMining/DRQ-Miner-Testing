# Build release artifacts on tag v* or manual dispatch.
# Private repo: download via GitHub Releases + PAT, or Actions run artifacts (see doc/GITHUB_PRIVATE_SETUP.md).

name: Release

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    tags:
      - "v*"
      - "beta-*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux-arm64-phone:
    name: Linux arm64 (Userland phone)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (cross aarch64)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake curl \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Fetch AstroSPSA aarch64 prebuilt
        run: bash scripts/ci/fetch_astrospsa_aarch64.sh

      - name: Build OpenSSL for aarch64
        run: bash scripts/ci/build_openssl_aarch64.sh "${{ github.workspace }}/.ci/openssl-aarch64"

      - name: Build (DERO + Verus CPU)
        env:
          CROSS_AARCH64: 1
          OPENSSL_AARCH64_PREFIX: ${{ github.workspace }}/.ci/openssl-aarch64
        run: bash scripts/android/build_userland.sh

      - name: Verify TNN ARM symbols linked
        run: |
          aarch64-linux-gnu-nm out/build/linux-arm64-phone-Release/drqminer | grep -E "branchComputeCPU_aarch64|initSPSA" | head -5

      - name: Verify NM (nm/1) symbols linked
        run: |
          aarch64-linux-gnu-nm out/build/linux-arm64-phone-Release/drqminer | grep -E "nm_fast_hash|nm_epoch" | head -5

      - name: Verify static binary (no host glibc)
        run: |
          file out/build/linux-arm64-phone-Release/drqminer
          ldd out/build/linux-arm64-phone-Release/drqminer 2>&1 | grep -q "not a dynamic executable"

      - name: Package
        run: |
          mkdir -p release-assets
          cd out/build/linux-arm64-phone-Release
          chmod +x drqminer
          cp -f "${GITHUB_WORKSPACE}/src/backend/opencl/cl/verus/verushash.cl" . 2>/dev/null || true
          tar czf ../../../release-assets/drqminer-linux-arm64-phone.tar.gz drqminer verushash.cl 2>/dev/null \
            || tar czf ../../../release-assets/drqminer-linux-arm64-phone.tar.gz drqminer
          sha256sum ../../../release-assets/drqminer-linux-arm64-phone.tar.gz > ../../../release-assets/drqminer-linux-arm64-phone.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: drqminer-linux-arm64-phone
          path: release-assets/drqminer-linux-arm64-phone.tar.gz*

  linux-x64:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake libssl-dev curl

      - name: Build (static — no libhwloc.so on target rigs)
        run: bash scripts/ci/build_linux_x64_release.sh

      - name: Verify static binary (no libhwloc.so)
        run: |
          _out="$(ldd out/build/linux-x64-Release/drqminer 2>&1 || true)"
          echo "${_out}"
          echo "${_out}" | grep -Eq "not a dynamic executable|statically linked"
          file out/build/linux-x64-Release/drqminer

      - name: Package
        run: |
          mkdir -p release-assets
          cd out/build/linux-x64-Release
          chmod +x drqminer
          cp -f "${GITHUB_WORKSPACE}/src/backend/opencl/cl/verus/verushash.cl" . 2>/dev/null || true
          tar czf "${GITHUB_WORKSPACE}/release-assets/drqminer-linux-x64.tar.gz" drqminer verushash.cl 2>/dev/null \
            || tar czf "${GITHUB_WORKSPACE}/release-assets/drqminer-linux-x64.tar.gz" drqminer
          sha256sum "${GITHUB_WORKSPACE}/release-assets/drqminer-linux-x64.tar.gz" \
            > "${GITHUB_WORKSPACE}/release-assets/drqminer-linux-x64.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: drqminer-linux-x64
          path: release-assets/drqminer-linux-x64.tar.gz*

  windows-x64:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset x64-Release -DXMRIG_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build out/build/x64-Release --config Release --target xmrig

      - name: Package (RELEASE folder + dependency report)
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/package_windows_release.ps1 `
            -BuildDir out/build/x64-Release -Config Release
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Copy-Item -Force out/build/x64-Release/DRQMiner-win64.zip release-assets/DRQMiner-win64.zip
          $hash = (Get-FileHash release-assets/DRQMiner-win64.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  DRQMiner-win64.zip" | Out-File release-assets/DRQMiner-win64.zip.sha256 -Encoding ascii

      - uses: actions/upload-artifact@v4
        with:
          name: DRQMiner-win64
          path: release-assets/DRQMiner-win64.zip*

  publish-release:
    name: Publish GitHub Release
    needs: [linux-arm64-phone, linux-x64, windows-x64]
    runs-on: ubuntu-latest
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: find dist -type f | sort

      - name: Create branded asset aliases
        run: |
          TAG="${GITHUB_REF_NAME}"
          cp dist/drqminer-linux-arm64-phone.tar.gz "dist/DRQ-Miner-${TAG}-linux-arm64-phone.tar.gz"
          cp dist/drqminer-linux-arm64-phone.tar.gz.sha256 "dist/DRQ-Miner-${TAG}-linux-arm64-phone.tar.gz.sha256"
          cp dist/drqminer-linux-x64.tar.gz "dist/DRQ-Miner-${TAG}-linux-x64.tar.gz"
          cp dist/drqminer-linux-x64.tar.gz.sha256 "dist/DRQ-Miner-${TAG}-linux-x64.tar.gz.sha256"
          cp dist/DRQMiner-win64.zip "dist/DRQ-Miner-${TAG}-win64.zip"
          cp dist/DRQMiner-win64.zip.sha256 "dist/DRQ-Miner-${TAG}-win64.zip.sha256"

      - name: Generate manifest.json
        run: |
          python3 scripts/upstream/generate_manifest.py \
            --tag "${GITHUB_REF_NAME}" \
            --dist dist \
            --out dist/manifest.json
          cat dist/manifest.json

      - name: Build release notes body
        run: |
          TAG="${GITHUB_REF_NAME}"
          if echo "$TAG" | grep -qi beta; then
            cat > release_body.md <<'EOF'
          ## DRQ Miner **beta** — Neuromorph (`nm/1` / Cereblix)

          Discord: https://discord.gg/ZJwJune3

          First public beta with **nm/1** mining (UNM `nm_fast` port). Also includes DERO AstroBWT v3, Verus CPU, and prior phone paths.

          ### Download (replace `TAG` with this release tag)

          | Platform | Asset |
          |----------|-------|
          | Windows x64 | `DRQMiner-win64.zip` |
          | Linux x64 rig | `drqminer-linux-x64.tar.gz` (static — no libhwloc apt needed) |
          | Linux arm64 phone | `drqminer-linux-arm64-phone.tar.gz` |

          Base: `https://github.com/DQMining/DRQ-Miner-Testing/releases/download/TAG/`

          ### Mine nm/1 (example)

          ```bash
          ./drqminer -a nm/1 -o eu.hashmonkeys.cloud:12427 -u YOUR_WALLET
          ```

          Startup log should show `nm scratch fill: VAES-256` (Zen3+/14900K), `AES-NI` (Haswell/Xeon v3 rigs), or `ARM-AES` (phones).

          ### Observed hashrate (nm/1, pool diff — your mileage may vary)

          | Hardware | Typical |
          |----------|---------|
          | i9-14900K (24 phys cores) | ~28–30 kH/s |
          | Galaxy S20-class phone | modest (thermal-limited) |
          | Xeon E3-1240 v3 / 1240Lv3 rig | ~3.0 kH/s (reference miners ~3.4+ kH/s — tuning backlog) |

          ### Known beta limitations

          - Older x64 CPUs without VAES use AES-NI scratch fill (slower than Zen4/14900K path).
          - Dev-fee proxy routes need operator-side wallet mapping.
          - Auto-update manifest channel is **beta** for this tag.

          Feedback welcome on Discord or GitHub issues.
          EOF
          else
            cat > release_body.md <<'EOF'
          ## DRQ Miner release

          Discord: https://discord.gg/ZJwJune3

          ## Auto-update
          - `manifest.json` is attached to this release (canonical copy also mirrored at https://www.dqmining.com/releases/manifest.json when configured).
          - Miner: set `"auto-update": true` in config or use `--apply-update` after a newer version is reported.

          ## Known limitations
          - Dev-fee proxy routes require operator-side wallet mapping.
          - Some protocols may need DRQ Proxy adapters per algorithm.
          EOF
          fi

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'beta') }}
          body_path: release_body.md
          files: |
            dist/drqminer-linux-arm64-phone.tar.gz
            dist/drqminer-linux-arm64-phone.tar.gz.sha256
            dist/drqminer-linux-x64.tar.gz
            dist/drqminer-linux-x64.tar.gz.sha256
            dist/DRQMiner-win64.zip
            dist/DRQMiner-win64.zip.sha256
            dist/DRQ-Miner-*-linux-arm64-phone.tar.gz
            dist/DRQ-Miner-*-linux-arm64-phone.tar.gz.sha256
            dist/DRQ-Miner-*-linux-x64.tar.gz
            dist/DRQ-Miner-*-linux-x64.tar.gz.sha256
            dist/DRQ-Miner-*-win64.zip
            dist/DRQ-Miner-*-win64.zip.sha256
            dist/manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
