# Build release artifacts on tag v* or manual dispatch.
# Private repo: download via GitHub Releases + PAT, or Actions run artifacts (see doc/GITHUB_PRIVATE_SETUP.md).

name: Release

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux-arm64-phone:
    name: Linux arm64 (Userland phone)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (cross aarch64)
        run: |
          sudo dpkg --add-architecture arm64
          # GitHub mirror lists lack arm64 on security.ubuntu.com; use ports for arm64 libs.
          sudo tee /etc/apt/sources.list.d/ubuntu-ports-arm64.list >/dev/null <<'EOF'
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main restricted universe multiverse
          EOF
          sudo apt-get update
          sudo apt-get install -y build-essential cmake \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libssl-dev:arm64

      - name: Build (DERO + Verus CPU)
        env:
          CROSS_AARCH64: 1
        run: bash scripts/android/build_userland.sh

      - name: Package
        run: |
          mkdir -p release-assets
          cd out/build/linux-arm64-phone-Release
          chmod +x drqminer
          cp -f "${GITHUB_WORKSPACE}/src/backend/opencl/cl/verus/verushash.cl" . 2>/dev/null || true
          tar czf ../../../release-assets/drqminer-linux-arm64-phone.tar.gz drqminer verushash.cl 2>/dev/null \
            || tar czf ../../../release-assets/drqminer-linux-arm64-phone.tar.gz drqminer
          sha256sum ../../../release-assets/drqminer-linux-arm64-phone.tar.gz > ../../../release-assets/drqminer-linux-arm64-phone.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: drqminer-linux-arm64-phone
          path: release-assets/drqminer-linux-arm64-phone.tar.gz*

  linux-x64:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake libssl-dev libhwloc-dev

      - name: Build
        run: |
          cmake --preset linux-x64-Release -DXMRIG_BUILD_TESTS=OFF
          cmake --build out/build/linux-x64-Release --target xmrig -j"$(nproc)"

      - name: Package
        run: |
          mkdir -p release-assets
          cd out/build/linux-x64-Release
          chmod +x drqminer
          cp -f "${GITHUB_WORKSPACE}/src/backend/opencl/cl/verus/verushash.cl" . 2>/dev/null || true
          tar czf "${GITHUB_WORKSPACE}/release-assets/drqminer-linux-x64.tar.gz" drqminer verushash.cl 2>/dev/null \
            || tar czf "${GITHUB_WORKSPACE}/release-assets/drqminer-linux-x64.tar.gz" drqminer
          sha256sum "${GITHUB_WORKSPACE}/release-assets/drqminer-linux-x64.tar.gz" \
            > "${GITHUB_WORKSPACE}/release-assets/drqminer-linux-x64.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: drqminer-linux-x64
          path: release-assets/drqminer-linux-x64.tar.gz*

  windows-x64:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset x64-Release -DXMRIG_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build out/build/x64-Release --config Release --target xmrig

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $dir = "out/build/x64-Release"
          $files = @(
            "$dir/DRQMiner-Release.exe",
            "$dir/verushash.cl"
          )
          if (Test-Path "$dir/xmrig_astro_spsa.dll") { $files += "$dir/xmrig_astro_spsa.dll" }
          Compress-Archive -Path $files -DestinationPath release-assets/DRQMiner-win64.zip -Force
          $hash = (Get-FileHash release-assets/DRQMiner-win64.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  DRQMiner-win64.zip" | Out-File release-assets/DRQMiner-win64.zip.sha256 -Encoding ascii

      - uses: actions/upload-artifact@v4
        with:
          name: DRQMiner-win64
          path: release-assets/DRQMiner-win64.zip*

  publish-release:
    name: Publish GitHub Release
    needs: [linux-arm64-phone, linux-x64, windows-x64]
    runs-on: ubuntu-latest
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: find dist -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/drqminer-linux-arm64-phone.tar.gz
            dist/drqminer-linux-arm64-phone.tar.gz.sha256
            dist/drqminer-linux-x64.tar.gz
            dist/drqminer-linux-x64.tar.gz.sha256
            dist/DRQMiner-win64.zip
            dist/DRQMiner-win64.zip.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
