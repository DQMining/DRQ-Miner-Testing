name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            preset: linux-x64-Release
          - os: macos-14
            preset: macos-arm64-Release
          - os: windows-latest
            preset: x64-Release
            config: Release

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential libssl-dev libhwloc-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl hwloc

      - name: Configure
        run: cmake --preset ${{ matrix.preset }} -DXMRIG_BUILD_TESTS=OFF

      - name: Build
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            cmake --build out/build/x64-Release --config ${{ matrix.config }}
          else
            cmake --build out/build/${{ matrix.preset }}
          fi
        shell: bash

      - name: Version smoke test
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            out/build/x64-Release/DRQMiner-Release.exe -V
          elif [ "${{ matrix.preset }}" = "macos-arm64-Release" ]; then
            out/build/macos-arm64-Release/drqminer -V
          else
            out/build/linux-x64-Release/drqminer -V
          fi
        shell: bash

      - name: AstroBWT vector test (ARM64 — DERO phone CPU path)
        if: matrix.preset == 'macos-arm64-Release'
        run: |
          BIN="out/build/macos-arm64-Release/test_astrobwt"
          if [ -x "$BIN" ]; then
            "$BIN"
          else
            echo "test_astrobwt not built, skipping"
          fi
        shell: bash
